name: CI — Affected Detection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# deploy-api needs packages: write to push Docker image to GHCR
permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/contracts/**'
            web:
              - 'apps/web/**'
              - 'packages/contracts/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/contracts/**'

  backend:
    name: Backend CI
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml

  web:
    name: Web CI
    needs: detect
    if: needs.detect.outputs.web == 'true'
    uses: ./.github/workflows/web.yml

  mobile:
    name: Mobile CI
    needs: detect
    if: needs.detect.outputs.mobile == 'true'
    uses: ./.github/workflows/mobile.yml

  # Gate: all required checks must pass before merge
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, web, mobile]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "Backend CI failed" && exit 1
          fi
          if [[ "${{ needs.web.result }}" == "failure" ]]; then
            echo "Web CI failed" && exit 1
          fi
          if [[ "${{ needs.mobile.result }}" == "failure" ]]; then
            echo "Mobile CI failed" && exit 1
          fi
          echo "All checks passed or skipped (no changes detected)"

  # Deploy — only on push to main, after CI passes
  # Depends directly on backend/web (not all-checks-passed) to avoid nested reusable workflow deps
  deploy-api:
    name: Deploy API
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.backend.result == 'success'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy-api.yml
    secrets: inherit

  deploy-web:
    name: Deploy Web
    needs: web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.web.result == 'success'
    uses: ./.github/workflows/deploy-web.yml
    secrets: inherit
